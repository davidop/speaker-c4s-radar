name: Discover C4S Opportunities

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: demo

      - name: Run C4S discovery
        run: node scripts/discover-c4s.mjs
        working-directory: demo
        env:
          C4S_EXTRA_SOURCES_JSON: ${{ secrets.C4S_EXTRA_SOURCES_JSON }}

      - name: Run tests
        run: npm test
        working-directory: demo

      - name: Build demo
        run: npm run build
        working-directory: demo

      - name: Detect repository changes
        id: changes
        run: |
          changed="false"
          if ! git diff --quiet; then
            changed="true"
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        id: create_pull_request
        if: steps.changes.outputs.changed == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit-message: 'chore(data): automated C4S discovery refresh'
          title: 'chore(data): automated C4S discovery refresh'
          body-path: demo/scripts/discovery-summary.md
          branch: bot/c4s-discovery
          delete-branch: true
          labels: |
            automation
            dataset

      - name: Warn if PR creation failed
        if: steps.changes.outputs.changed == 'true' && steps.create_pull_request.outcome == 'failure'
        run: |
          echo "PR creation failed. This usually means repository settings block GitHub Actions from creating PRs."
          echo "Enable this in Settings > Actions > General > Workflow permissions."
